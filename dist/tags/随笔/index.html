  const modal = document.getElementById('search-modal');
  const trigger = document.getElementById('search-trigger');
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  const closeBtn = document.getElementById('search-close');
  let pagefind = null;

  async function loadPagefind() {
    if (!pagefind) {
      try {
        pagefind = await import('/pagefind/pagefind.js');
        await pagefind.options({ excerptLength: 15 });
      } catch (e) {
        console.log('Pagefind not ready, run npm run build first');
        return null;
      }
    }
    return pagefind;
  }

  async function performSearch(query) {
    if (!query) {
      results.innerHTML = '<p class="search-hint">输入关键词搜索文章</p>';
      return;
    }
    
    const pf = await loadPagefind();
    if (!pf) {
      results.innerHTML = '<p class="search-hint">请先运行 npm run build 构建搜索索引</p>';
      return;
    }

    const search = await pf.search(query);
    if (search.results.length === 0) {
      results.innerHTML = '<p class="search-hint">没有找到相关结果</p>';
      return;
    }

    const items = await Promise.all(search.results.slice(0, 10).map(r => r.data()));
    results.innerHTML = items.map(item => `
      <a href="${item.url}" class="search-result">
        <h3>${item.meta?.title || 'Untitled'}</h3>
        <p>${item.excerpt || ''}</p>
      </a>
    `).join('');
  }

  trigger?.addEventListener('click', async () => {
    modal?.classList.add('active');
    await loadPagefind();
    input?.focus();
  });

  closeBtn?.addEventListener('click', () => {
    modal?.classList.remove('active');
  });

  modal?.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.classList.remove('active');
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      modal?.classList.remove('active');
    }
    if (e.key === 'k' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      modal?.classList.add('active');
      input?.focus();
    }
  });

  let debounceTimer;
  input?.addEventListener('input', (e) => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      performSearch(e.target.value);
    }, 300);
  });
